name: stock-analysis

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'

jobs:
  run-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis
        run: python main.py

      - name: Send newest daily report
        run: |
          FILE=$(ls -t reports/report_*.md | head -n 1)
          echo "Sending file: $FILE"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendDocument" \
            -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F document=@"$FILE"

      - name: Send newest market review
        run: |
          FILE=$(ls -t reports/market_review_*.md | head -n 1)
          echo "Sending file: $FILE"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendDocument" \
            -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F document=@"$FILE"
