name: stock-analysis

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'

jobs:
  run-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis
        run: python main.py

      - name: Send daily report to Telegram
        run: |
          FILE="reports/report_$(date +%Y%m%d).md"
          if [ -f "$FILE" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendDocument" \
              -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -F document=@"$FILE"
          else
            echo "Daily report file not found: $FILE"
            exit 1
          fi

      - name: Send market review to Telegram
        run: |
          FILE="reports/market_review_$(date +%Y%m%d).md"
          if [ -f "$FILE" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendDocument" \
              -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -F document=@"$FILE"
          else
            echo "Market review file not found: $FILE"
            exit 1
          fi
